<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" role="img" aria-label="Gas cost: individual vs batched settlement">
  <defs>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f43f5e"/><stop offset="100%" stop-color="#fb7185"/></linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
  </defs>

  <rect width="880" height="360" fill="#070a13"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">

    <!-- title -->
    <text x="40" y="50" fill="#64748b" font-size="11" font-family="ui-monospace, Menlo, monospace" letter-spacing="3">SETTLING 50 SESSIONS</text>
    <text x="40" y="80" fill="#ffffff" font-size="24" font-weight="700" letter-spacing="-0.5">Individual vs batched</text>

    <!-- Row 1: individual settlement -->
    <text x="40" y="135" fill="#94a3b8" font-size="13" font-weight="500">Individual settlement (50 txs)</text>
    <rect x="40" y="148" width="700" height="28" rx="6" fill="#1e293b"/>
    <rect x="40" y="148" width="700" height="28" rx="6" fill="url(#rose)"/>
    <text x="750" y="167" fill="#ffffff" font-size="12" font-weight="700" font-family="ui-monospace, Menlo, monospace">~4,000,000 gas</text>

    <!-- Row 2: batched settlement -->
    <text x="40" y="220" fill="#94a3b8" font-size="13" font-weight="500">Batched via merkle root (1 tx)</text>
    <rect x="40" y="233" width="700" height="28" rx="6" fill="#1e293b"/>
    <rect x="40" y="233" width="35" height="28" rx="6" fill="url(#emerald)"/>
    <text x="85" y="252" fill="#34d399" font-size="12" font-weight="700" font-family="ui-monospace, Menlo, monospace">~200,000 gas</text>

    <!-- Savings callout -->
    <g transform="translate(590,275)">
      <rect width="220" height="60" rx="14" fill="#10b981" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.45"/>
      <text x="110" y="34" fill="#34d399" font-size="28" font-weight="800" text-anchor="middle">20×</text>
      <text x="110" y="50" fill="#94a3b8" font-size="10" font-family="ui-monospace, Menlo, monospace" text-anchor="middle">cheaper · same security</text>
    </g>

    <!-- Footnote -->
    <text x="40" y="345" fill="#475569" font-size="10" font-family="ui-monospace, Menlo, monospace">approximate · costs depend on chain and verifier · merkle proof per leaf adds ~12k gas at verification</text>

  </g>
</svg>
