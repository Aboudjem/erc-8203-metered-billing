<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" role="img" aria-label="Sequence flow">
  <defs>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <style><![CDATA[
      .sans { font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
      .msg { stroke-dasharray: 5 4; animation: dash 1.4s linear infinite; }
      .arrow-1 { animation: slide 5s ease-in-out infinite; animation-delay: 0s; opacity: 0; }
      .arrow-2 { animation: slide 5s ease-in-out infinite; animation-delay: 0.7s; opacity: 0; }
      .arrow-3 { animation: slide 5s ease-in-out infinite; animation-delay: 1.4s; opacity: 0; }
      .arrow-4 { animation: slide 5s ease-in-out infinite; animation-delay: 2.1s; opacity: 0; }
      .arrow-5 { animation: slide 5s ease-in-out infinite; animation-delay: 3.0s; opacity: 0; }
      @keyframes dash { to { stroke-dashoffset: -18; } }
      @keyframes slide {
        0% { opacity: 0; }
        10% { opacity: 1; }
        85% { opacity: 1; }
        100% { opacity: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .msg, .arrow-1, .arrow-2, .arrow-3, .arrow-4, .arrow-5 { animation: none !important; opacity: 1 !important; }
      }
    ]]></style>
  </defs>

  <rect width="880" height="360" fill="#070a13"/>

  <!-- Lifelines -->
  <g stroke="#1e293b" stroke-width="1" stroke-dasharray="4 4">
    <line x1="160" y1="60" x2="160" y2="320"/>
    <line x1="440" y1="60" x2="440" y2="320"/>
    <line x1="720" y1="60" x2="720" y2="320"/>
  </g>

  <!-- Headers -->
  <g class="sans" font-weight="600" font-size="13" fill="#f1f5f9" text-anchor="middle">
    <rect x="100" y="32" width="120" height="32" rx="16" fill="#0f1524" stroke="#1e293b"/>
    <text x="160" y="52">Client Agent</text>

    <rect x="380" y="32" width="120" height="32" rx="16" fill="#0f1524" stroke="#1e293b"/>
    <text x="440" y="52">Provider Agent</text>

    <rect x="660" y="32" width="120" height="32" rx="16" fill="#0f1524" stroke="#1e293b"/>
    <text x="720" y="52">Settlement</text>
  </g>

  <!-- Step 1: Open -->
  <g class="arrow-1">
    <line class="msg" x1="160" y1="100" x2="440" y2="100" stroke="url(#cyan)" stroke-width="1.5"/>
    <polygon points="438,96 446,100 438,104" fill="#22d3ee"/>
    <text class="mono" fill="#22d3ee" font-size="11" x="300" y="92" text-anchor="middle">1. signed ConditionalLock (off-chain)</text>
  </g>

  <!-- Step 2: receipts -->
  <g class="arrow-2">
    <line class="msg" x1="440" y1="140" x2="160" y2="140" stroke="#a78bfa" stroke-width="1.5"/>
    <polygon points="162,136 154,140 162,144" fill="#a78bfa"/>
    <text class="mono" fill="#a78bfa" font-size="11" x="300" y="132" text-anchor="middle">2. signed meter receipt #1 (off-chain)</text>
  </g>

  <g class="arrow-3">
    <line class="msg" x1="440" y1="170" x2="160" y2="170" stroke="#a78bfa" stroke-width="1.5"/>
    <polygon points="162,166 154,170 162,174" fill="#a78bfa"/>
    <text class="mono" fill="#a78bfa" font-size="11" x="300" y="162" text-anchor="middle">3. receipt #2 ... #N</text>
  </g>

  <!-- Step 3: settle -->
  <g class="arrow-4">
    <line x1="440" y1="220" x2="720" y2="220" stroke="#34d399" stroke-width="2"/>
    <polygon points="718,216 726,220 718,224" fill="#34d399"/>
    <text class="mono" fill="#34d399" font-size="11" x="580" y="212" text-anchor="middle">4. settleConditional(latest receipt)</text>
  </g>

  <!-- Step 5: payouts -->
  <g class="arrow-5">
    <line x1="720" y1="270" x2="440" y2="270" stroke="#34d399" stroke-width="2"/>
    <polygon points="442,266 434,270 442,274" fill="#34d399"/>
    <text class="mono" fill="#34d399" font-size="11" x="580" y="262" text-anchor="middle">5a. provider gets earned amount</text>

    <line x1="720" y1="298" x2="160" y2="298" stroke="#34d399" stroke-width="2"/>
    <polygon points="162,294 154,298 162,302" fill="#34d399"/>
    <text class="mono" fill="#34d399" font-size="11" x="440" y="290" text-anchor="middle">5b. client gets refund of remainder</text>
  </g>

  <!-- footer note -->
  <text class="mono" fill="#64748b" font-size="10" x="440" y="340" text-anchor="middle">one on-chain tx · the rest is off-chain · disputes resolved via the same primitives</text>
</svg>
