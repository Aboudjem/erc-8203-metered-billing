<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" role="img" aria-label="Where metered billing fits in the agent stack">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#f472b6"/></linearGradient>
  </defs>

  <rect width="880" height="460" fill="#070a13"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">

    <text x="40" y="50" fill="#64748b" font-size="11" font-family="ui-monospace, Menlo, monospace" letter-spacing="3">AGENT STACK</text>
    <text x="40" y="80" fill="#ffffff" font-size="24" font-weight="700" letter-spacing="-0.5">Where metered billing fits</text>

    <!-- Top: this profile -->
    <g transform="translate(120,120)">
      <rect width="640" height="62" rx="12" fill="#0f1524" stroke="#f472b6" stroke-opacity="0.55"/>
      <rect width="6" height="62" rx="3" fill="url(#g5)"/>
      <circle cx="34" cy="22" r="3.5" fill="#f472b6"/>
      <text x="48" y="26" fill="#f472b6" font-size="12" font-weight="700" font-family="ui-monospace, Menlo, monospace">this profile</text>
      <text x="22" y="46" fill="#ffffff" font-size="15" font-weight="700">Metered Billing for Agent Services</text>
      <text x="22" y="58" fill="#64748b" font-size="10" font-family="ui-monospace, Menlo, monospace">a pattern, not a new ERC</text>
    </g>

    <!-- Layer 4: ERC-8203 settlement -->
    <g transform="translate(120,200)">
      <rect width="640" height="46" rx="10" fill="#0f1524" stroke="#34d399" stroke-opacity="0.45"/>
      <rect width="6" height="46" rx="3" fill="url(#g4)"/>
      <text x="22" y="22" fill="#34d399" font-size="12" font-weight="700" font-family="ui-monospace, Menlo, monospace">ERC-8203</text>
      <text x="110" y="22" fill="#cbd5e1" font-size="13">Off-chain conditional settlement</text>
      <text x="22" y="40" fill="#64748b" font-size="10" font-family="ui-monospace, Menlo, monospace">how do they actually pay each other?</text>
    </g>

    <!-- Layer 3: ERC-8183 commerce -->
    <g transform="translate(120,260)">
      <rect width="640" height="46" rx="10" fill="#0f1524" stroke="#fbbf24" stroke-opacity="0.45"/>
      <rect width="6" height="46" rx="3" fill="url(#g3)"/>
      <text x="22" y="22" fill="#fbbf24" font-size="12" font-weight="700" font-family="ui-monospace, Menlo, monospace">ERC-8183</text>
      <text x="110" y="22" fill="#cbd5e1" font-size="13">Job escrow and commerce</text>
      <text x="22" y="40" fill="#64748b" font-size="10" font-family="ui-monospace, Menlo, monospace">what's the budget for the work?</text>
    </g>

    <!-- Layer 2: ERC-8118 authorization -->
    <g transform="translate(120,320)">
      <rect width="640" height="46" rx="10" fill="#0f1524" stroke="#a78bfa" stroke-opacity="0.45"/>
      <rect width="6" height="46" rx="3" fill="url(#g2)"/>
      <text x="22" y="22" fill="#a78bfa" font-size="12" font-weight="700" font-family="ui-monospace, Menlo, monospace">ERC-8118</text>
      <text x="110" y="22" fill="#cbd5e1" font-size="13">Function-level authorization</text>
      <text x="22" y="40" fill="#64748b" font-size="10" font-family="ui-monospace, Menlo, monospace">what can this agent call?</text>
    </g>

    <!-- Layer 1: ERC-8004 identity -->
    <g transform="translate(120,380)">
      <rect width="640" height="46" rx="10" fill="#0f1524" stroke="#22d3ee" stroke-opacity="0.45"/>
      <rect width="6" height="46" rx="3" fill="url(#g1)"/>
      <text x="22" y="22" fill="#22d3ee" font-size="12" font-weight="700" font-family="ui-monospace, Menlo, monospace">ERC-8004</text>
      <text x="110" y="22" fill="#cbd5e1" font-size="13">Agent identity, reputation, validation</text>
      <text x="22" y="40" fill="#64748b" font-size="10" font-family="ui-monospace, Menlo, monospace">who is this agent?</text>
    </g>

  </g>
</svg>
